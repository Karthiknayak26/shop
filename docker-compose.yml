version: '3.8'

services:
  mongodb:
    image: mongo:5-focal
    container_name: shop_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/kandukuru-supermarket
      - JWT_SECRET=change_this_to_a_random_secure_key_for_production_deployment
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shop_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always

  adminpanel:
    build:
      context: ./adminpanel/admin
      dockerfile: Dockerfile
    container_name: shop_adminpanel
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
    driver: local
